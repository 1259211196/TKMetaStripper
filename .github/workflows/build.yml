- name: 5. 编译与终极组装 (使用真实资产)
      run: |
        # 1. 执行编译，让 Theos 自动组装 Resources 文件夹里的所有资源
        make stage FINALPACKAGE=1
        
        # 2. 准备 Payload 暂存区用于打包 IPA
        rm -rf Payload
        mkdir -p Payload
        
        # 🚀 核心修复：从暂存区 (_) 提取包含资源文件的“完全体” App
        cp -r _/Applications/TKMetaStripper.app Payload/
        
        # 3. 兜底逻辑：无论您建在了根目录还是 Resources 里，都确保 Plist 被正确注入
        if [ -f "Info.plist" ]; then
          cp Info.plist Payload/TKMetaStripper.app/
        elif [ -f "Resources/Info.plist" ]; then
          cp Resources/Info.plist Payload/TKMetaStripper.app/
        fi
        
        # 🌟 此处已删除：那个画圆点的 magick 指令。
        # 我们将依赖 Theos 从 Resources 目录自动打包进来的 Icon.png。
        
        # 4. 清理、赋权与伪签名，巨魔防闪退
        rm -rf Payload/TKMetaStripper.app/_CodeSignature
        find Payload/TKMetaStripper.app -type d -exec chmod 755 {} +
        find Payload/TKMetaStripper.app -type f -exec chmod 644 {} +
        # 必须赋予主程序最高执行权限
        chmod 755 Payload/TKMetaStripper.app/TKMetaStripper
        
        # 巨魔防闪退必备：伪签名
        ldid -S Payload/TKMetaStripper.app/TKMetaStripper
        
        # 5. 打包成标准结构的 IPA
        zip -r TKMetaStripper.ipa Payload
