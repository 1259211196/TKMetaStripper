name: Build TKVideoCleaner IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 安装底层编译依赖
      run: |
        brew install ldid dpkg

    - name: 3. 安装 Theos 逆向编译框架
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: 4. 安装 iOS SDKs
      run: |
        rm -rf $THEOS/sdks
        git clone https://github.com/theos/sdks.git $THEOS/sdks

    - name: 5. 编译、终极权限清洗并打包
      run: |
        make clean
        make FINALPACKAGE=1
        mkdir -p Payload
        cp -r .theos/obj/**/TKVideoCleaner.app Payload/
        cp Info.plist Payload/TKVideoCleaner.app/
        
        # 🔥 终极白名单权限隔离机制
        # A. 删除 Theos 可能残留的废弃签名文件夹
        rm -rf Payload/TKVideoCleaner.app/_CodeSignature
        
        # B. 目录赋予 755 穿透权限，保证巨魔能读取
        find Payload/TKVideoCleaner.app -type d -exec chmod 755 {} +
        
        # C. 核心杀招：所有普通文件（包括 plist）强制设为 644 (剥夺所有执行权限)
        find Payload/TKVideoCleaner.app -type f -exec chmod 644 {} +
        
        # D. 唯独给真正的二进制核心程序赋予 755 运行权限
        chmod 755 Payload/TKVideoCleaner.app/TKVideoCleaner
        
        # E. 使用云端 ldid 进行一次预签名，重塑完美的 Mach-O 头部结构给巨魔看
        ldid -S Payload/TKVideoCleaner.app/TKVideoCleaner
        
        zip -r TKVideoCleaner.ipa Payload

    - name: 6. 上传最终产物供下载
      uses: actions/upload-artifact@v4
      with:
        name: TKVideoCleaner_App_IPA
        path: TKVideoCleaner.ipa
