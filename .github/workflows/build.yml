name: Build TKVideoCleaner IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 安装底层编译依赖
      run: |
        brew install ldid dpkg

    - name: 3. 安装 Theos 逆向编译框架
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: 4. 安装 iOS SDKs
      run: |
        rm -rf $THEOS/sdks
        git clone https://github.com/theos/sdks.git $THEOS/sdks

    - name: 5. 编译并打包为纯净 IPA
      run: |
        make clean
        make FINALPACKAGE=1
        mkdir -p Payload
        cp -r .theos/obj/**/TKVideoCleaner.app Payload/
        # 🔥 核心修复：强行将 Info.plist 植入 App 包内部，完美解决巨魔 302 报错
        cp Info.plist Payload/TKVideoCleaner.app/
        zip -r TKVideoCleaner.ipa Payload

    - name: 6. 上传最终产物供下载
      uses: actions/upload-artifact@v4
      with:
        name: TKVideoCleaner_App_IPA
        path: TKVideoCleaner.ipa
