name: Build TKMetaStripper IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 安装底层编译依赖
      run: |
        brew install ldid dpkg imagemagick

    - name: 3. 安装 Theos 逆向编译框架
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: 4. 安装 iOS SDKs
      run: |
        rm -rf $THEOS/sdks
        git clone https://github.com/theos/sdks.git $THEOS/sdks

    - name: 5. 编译并注入圆点 Logo
      run: |
        make clean
        make FINALPACKAGE=1
        
        rm -rf Payload
        mkdir -p Payload
        cp -RL .theos/obj/TKMetaStripper.app Payload/
        cp Info.plist Payload/TKMetaStripper.app/
        
        # 🔥 核心更新：使用 ImageMagick 绘制一个完美的白底红点 Logo 注入 App！
        magick -size 256x256 xc:white -fill "#FF3B30" -draw "circle 128,128 128,40" Payload/TKMetaStripper.app/Icon.png
        
        rm -rf Payload/TKMetaStripper.app/_CodeSignature
        find Payload/TKMetaStripper.app -type d -exec chmod 755 {} +
        find Payload/TKMetaStripper.app -type f -exec chmod 644 {} +
        chmod 755 Payload/TKMetaStripper.app/TKMetaStripper
        ldid -S Payload/TKMetaStripper.app/TKMetaStripper
        
        zip -r TKMetaStripper.ipa Payload

    - name: 6. 上传最终产物供下载
      uses: actions/upload-artifact@v4
      with:
        name: TKMetaStripper_App_IPA
        path: TKMetaStripper.ipa
