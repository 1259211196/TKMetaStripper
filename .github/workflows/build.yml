name: Build TKMetaStripper Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
    - name: 1. 检出你的代码
      uses: actions/checkout@v4

    - name: 2. 安装依赖环境 (ldid 和 dpkg)
      run: |
        brew install ldid dpkg

    - name: 3. 在云端静默安装 Theos 编译环境
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: 4. 下载 iOS SDK (修复文件夹冲突)
      run: |
        rm -rf $THEOS/sdks
        git clone https://github.com/theos/sdks.git $THEOS/sdks

    - name: 5. 编译 Release 正式版
      run: |
        make clean
        make FINALPACKAGE=1

    - name: 6. 提取产物并生成下载链接
      uses: actions/upload-artifact@v4
      with:
        name: TKMetaStripper_Release_Dylib
        path: .theos/obj/**/TKMetaStripper.dylib
