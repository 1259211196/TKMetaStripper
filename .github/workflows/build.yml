name: Build TKVideoCleaner IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 安装底层编译依赖
      run: |
        brew install ldid dpkg

    - name: 3. 安装 Theos 逆向编译框架
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: 4. 安装 iOS SDKs
      run: |
        rm -rf $THEOS/sdks
        git clone https://github.com/theos/sdks.git $THEOS/sdks

    - name: 5. 编译、清洗权限并打包
      run: |
        make clean
        make FINALPACKAGE=1
        mkdir -p Payload
        cp -r .theos/obj/**/TKVideoCleaner.app Payload/
        cp Info.plist Payload/TKVideoCleaner.app/
        
        # 🔥 核心修复：权限大清洗，解决巨魔 175 报错
        # 1. 强行剥夺所有文件的可执行权限
        find Payload/TKVideoCleaner.app -type f -exec chmod -x {} +
        # 2. 唯独给真正的二进制核心文件赋予可执行权限
        chmod +x Payload/TKVideoCleaner.app/TKVideoCleaner
        
        zip -r TKVideoCleaner.ipa Payload

    - name: 6. 上传最终产物供下载
      uses: actions/upload-artifact@v4
      with:
        name: TKVideoCleaner_App_IPA
        path: TKVideoCleaner.ipa
